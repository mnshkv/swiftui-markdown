name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Full build + test on macOS: MarkdownTextEngine uses CoreText / Core Graphics /
  # SwiftUI / AppKit (Apple frameworks), which do not exist on Linux. `swift test`
  # on macOS builds the pure core + the AppKit path and runs the whole suite.
  test:
    name: Build & Test (macOS, Swift 6.2)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode (provides Swift 6.2)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Toolchain
        run: swift --version
      - name: Build (with tests)
        run: swift build --build-tests
      - name: Test
        run: swift test

  # The parser (MarkdownAST) is intentionally pure Swift with zero dependencies
  # and must keep building on Linux. Build ONLY that target (the Apple-only
  # MarkdownTextEngine target is not a dependency, so it is never compiled here).
  parser-linux:
    name: Parser builds on Linux (zero-dep guard)
    runs-on: ubuntu-latest
    container: swift:6.2
    steps:
      - uses: actions/checkout@v4
      - name: Build MarkdownAST only
        run: swift build --target MarkdownAST

  lint:
    name: SwiftLint
    runs-on: ubuntu-latest
    container: ghcr.io/realm/swiftlint:latest
    steps:
      - uses: actions/checkout@v4
      - name: SwiftLint
        run: swiftlint lint --reporter github-actions-logging
